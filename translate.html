function loadScript(src){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src + '?v=1';
    s.onload = resolve;
    s.onerror = reject;
    const timer = setTimeout(()=>{
      s.onload = null;
      s.onerror = null;
      reject(new Error('timeout'));
    }, 15000);
    s.addEventListener('load', ()=>clearTimeout(timer));
    s.addEventListener('error', ()=>clearTimeout(timer));
    document.body.appendChild(s);
  });
}

let SORTED_DICT, REV_MAP_SPOKEN, REV_MAP_WRITTEN, REV_KEYS_ALL, EFFECTIVE_DICT, ED;

function initTranslateEngine(){
  EFFECTIVE_DICT = DICT.filter(e => {
    if (e[0] !== e[1] || e[0] !== e[2]) return true;
    if (e[4] !== null) return true;
    return false;
  });
  SORTED_DICT = EFFECTIVE_DICT.slice().sort((a,b) => b[0].length - a[0].length);
  
  REV_MAP_SPOKEN = {};
  REV_MAP_WRITTEN = {};
  SORTED_DICT.forEach(entry => {
    const [pth, spoken, written, jp] = entry;
    if (spoken !== pth && !REV_MAP_SPOKEN[spoken]) REV_MAP_SPOKEN[spoken] = {pth, jp};
    if (written !== pth && written !== spoken && !REV_MAP_WRITTEN[written]) REV_MAP_WRITTEN[written] = {pth, jp};
  });
  const REV_KEYS_SPOKEN = Object.keys(REV_MAP_SPOKEN).sort((a,b) => b.length - a.length);
  const REV_KEYS_WRITTEN = Object.keys(REV_MAP_WRITTEN).sort((a,b) => b.length - a.length);
  REV_KEYS_ALL = [...new Set([...REV_KEYS_SPOKEN, ...REV_KEYS_WRITTEN])].sort((a,b) => b.length - a.length);

  initDictIndex();
  renderHistory();
}

<!-- ===== 翻译函数+UI逻辑（不依赖数据，延迟执行）===== -->
<script>
function translatePth2Cant(text, st) {
  let result = [], diffs = [], cultureHits = new Set(), i = 0;
  const len = text.length;
  while (i < len) {
    let matched = false;
    for (const entry of SORTED_DICT) {
      const pth = entry[0];
      if (text.substring(i, i + pth.length) === pth) {
        const target = st === 'spoken' ? entry[1] : entry[2];
        result.push(target);
        if (target !== pth) diffs.push({from: pth, to: target, jp: entry[3]});
        if (entry[4]) cultureHits.add(target);
        for (const ckey of Object.keys(CULTURE_NOTES)) {
          if (target.includes(ckey)) cultureHits.add(ckey);
        }
        i += pth.length; matched = true; break;
      }
    }
    if (!matched) { result.push(text[i]); i++; }
  }
  let translated = result.join('');
  translated = translated.replace(/(.)(不)\1/g, '$1唔$1');
  let cultureNotes = {};
  diffs.forEach(d => {
    const entry = SORTED_DICT.find(e => e[0] === d.from);
    if (entry && entry[4]) cultureNotes[d.to] = entry[4];
  });
  for (const [key, val] of Object.entries(CULTURE_NOTES)) {
    if (translated.includes(key) && !cultureNotes[key]) cultureNotes[key] = val;
  }
  return {translated, diffs, cultureNotes};
}

function translateCant2Pth(text) {
  let result = [], diffs = [], i = 0;
  const len = text.length;
  while (i < len) {
    let matched = false;
    for (const key of REV_KEYS_ALL) {
      if (text.substring(i, i + key.length) === key) {
        const entry = REV_MAP_SPOKEN[key] || REV_MAP_WRITTEN[key];
        result.push(entry.pth);
        if (entry.pth !== key) diffs.push({from: key, to: entry.pth, jp: entry.jp});
        i += key.length; matched = true; break;
      }
    }
    if (!matched) { result.push(text[i]); i++; }
  }
  return {translated: result.join(''), diffs, cultureNotes: {}};
}

const TONE_COLORS = {1:'#E11D48',2:'#F97316',3:'#2563EB',4:'#7C3AED',5:'#16A34A',6:'#64748B'};

function annotateJyutping(text) {
  let html = '', plain = '';
  for (const ch of text) {
    const info = JYUTPING_MAP[ch];
    if (info) {
      const color = TONE_COLORS[info.tone] || '#64748B';
      html += '<ruby>'+ch+'<rt style="color:'+color+'">'+info.jp+'</rt></ruby>';
    } else if (/[\u4e00-\u9fff]/.test(ch)) {
      html += '<ruby>'+ch+'<rt class="unmatched">?</rt></ruby>';
    } else { html += ch; }
    plain += ch;
  }
  return {html, plain};
}

function doTranslate() {
  if (!dataReady) return;
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;
  
  let result;
  if (direction === 'pth2cant') result = translatePth2Cant(input, style);
  else result = translateCant2Pth(input);
  
  const annotated = direction === 'pth2cant' ? annotateJyutping(result.translated) : {html: result.translated, plain: result.translated};
  lastPlainResult = annotated.plain;
  
  const inputJpSection = document.getElementById('inputJyutpingSection');
  if (direction === 'cant2pth') {
    document.getElementById('inputJyutpingText').innerHTML = annotateJyutping(input).html;
    inputJpSection.style.display = 'block';
  } else { inputJpSection.style.display = 'none'; }
  
  document.getElementById('resultText').innerHTML = annotated.html;
  document.getElementById('resultSection').classList.add('show');
  
  const diffItems = document.getElementById('diffItems');
  if (result.diffs.length > 0) {
    document.getElementById('diffSection').style.display = 'block';
    diffItems.innerHTML = result.diffs
      .filter((d, i, arr) => arr.findIndex(x => x.from === d.from && x.to === d.to) === i)
      .map(d => '<span class="diff-item"><span class="from">'+d.from+'</span><span class="arrow">&rarr;</span><span class="to">'+d.to+'</span><span class="jp">'+d.jp+'</span></span>')
      .join('');
  } else { document.getElementById('diffSection').style.display = 'none'; }
  
  const cultureSection = document.getElementById('cultureSection');
  const cultureItems = document.getElementById('cultureItems');
  const notes = Object.entries(result.cultureNotes);
  if (notes.length > 0) {
    cultureSection.classList.add('show');
    cultureItems.innerHTML = notes.map(([key, val]) =>
      '<div class="culture-item"><span class="culture-keyword">「'+key+'」</span>：'+val+'</div>'
    ).join('');
  } else { cultureSection.classList.remove('show'); }
  
  saveHistory({ input, output: annotated.plain, direction, style, time: new Date().toLocaleString('zh-CN') });
  
  if(typeof gtag==='function') gtag('event','translate_action',{direction:direction,style:style,input_length:input.length});
}

function initDictIndex(){
  if(typeof DICT==='undefined')return;
  const _origGroup=new Array(DICT.length);

function filterDict(){
  dictFiltered=[];
  for(let i=0;i<ED.length;i++){
    const d=ED[i],e=d.e;
    if(dictCat==='_hot'){if(!HOT_WORDS.has(e[0]))continue}

    if(dictQ){if(!e[0].toLowerCase().includes(dictQ)&&!e[1].toLowerCase().includes(dictQ)&&!e[3].toLowerCase().includes(dictQ))continue}
    dictFiltered.push(i);

  dictShown=0;document.getElementById('dictList').innerHTML='';

  document.getElementById('dictStats').textContent='共 '+dictFiltered.length.toLocaleString()+' 条'+(label?' · '+label:'')+(dictQ?' · 搜索: "'+dictQ+'"':'');

    return;
  }
  const el=document.getElementById('dictList'),end=Math.min(dictShown+DICT_PAGE,dictFiltered.length);
  let h='';
  for(let i=dictShown;i<end;i++){
    const d=ED[dictFiltered[i]],e=d.e,pth=e[0],sp=e[1],wr=e[2],jp=e[3],nt=e[4];
    const ann=annotateJyutping(sp);
    let note=nt||'';
    if(!note){for(const k of Object.keys(CULTURE_NOTES)){if(sp.includes(k)||pth.includes(k)){note=CULTURE_NOTES[k];break}}}
    const spEsc=sp.replace(/'/g,"\\'");
    const diff=sp!==wr&&wr!==pth?' <span style="font-size:11px;color:#8C7E73">书面: '+wr+'</span>':'';
    h+='<div class="dict-card" onclick="dictClick('+dictFiltered[i]+')"><div class="dict-card-top"><span class="dict-card-pth">'+pth+'</span><span class="dict-card-arrow">&rarr;</span><span class="dict-card-cant">'+sp+'</span>'+diff+'</div><div class="dict-card-jp">'+ann.html+'</div>'+(note?'<div class="dict-card-note">'+note+'</div>':'')+'<button class="dict-card-speak" onclick="event.stopPropagation();speak(\''+spEsc+'\',this)">&#x1f50a;</button></div>';
  }
  el.insertAdjacentHTML('beforeend',h);dictShown=end;
  document.getElementById('dictMoreBtn').style.display=dictShown<dictFiltered.length?'':'none';
  document.getElementById('dictStats').textContent='显示 '+dictShown+' / '+dictFiltered.length.toLocaleString()+' 条';
}
function dictClick(edIdx){const e=ED[edIdx].e;document.getElementById('inputText').value=e[0];if(direction!=='pth2cant')toggleDirection();doTranslate();document.getElementById('resultSection').scrollIntoView({behavior:'smooth'})}

// ===== 英粤/俚语面板（懒加载）=====
const subState={eng:{open:false,cat:null,q:'',filtered:[],shown:0,timer:null},slang:{open:false,cat:null,q:'',filtered:[],shown:0,timer:null}};
const SUB_PAGE=50;

function loadAndToggleSub(type){
  if(!extraReady){
    const banner=document.getElementById(type+'Banner');
    banner.textContent='加载中...';
    loadScript('gaaudim-translate-extra.js').then(()=>{
      extraReady=true;
      if(type==='eng'){
        banner.innerHTML='&#x1f524; 常见英粤表达 · '+ENGLISH_CANT.length+'条 <span class="arrow">&rarr;</span>';
      } else {
        banner.innerHTML='&#x1f5e3;&#xfe0f; 粤语俚语百科 · '+SLANG_DICT.length+'条 <span class="arrow">&rarr;</span>';
      }
      toggleSubPanel(type);
    }).catch(()=>{
      banner.textContent='加载失败，点击重试';
      extraReady=false;
    });
  } else {
    toggleSubPanel(type);
  }
}

function getSubData(type){return type==='eng'?ENGLISH_CANT:SLANG_DICT}
function getSubCats(type){const data=getSubData(type),cats={};data.forEach(e=>{const c=e[3];cats[c]=(cats[c]||0)+1});return cats}

function toggleSubPanel(type){
  const s=subState[type];
  if(!s.open){if(dictOpen)toggleDictPanel();['eng','slang'].forEach(t=>{if(t!==type&&subState[t].open){subState[t].open=false;document.getElementById(t+'Panel').classList.remove('open');document.getElementById(t+'Banner').style.display=''}})}
  s.open=!s.open;
  const p=document.getElementById(type+'Panel'),b=document.getElementById(type+'Banner');
  if(s.open){p.classList.add('open');b.style.display='none';initSubPanel(type)}
  else{p.classList.remove('open');b.style.display=''}
}
function initSubPanel(type){
  const data=getSubData(type),cats=getSubCats(type),s=subState[type];
  const cEl=document.getElementById(type+'Cats');
  let h='<button class="dict-cat-pill active" data-cat="" onclick="selSubCat(\''+type+'\',null)">全部 <span class="ct">'+data.length+'</span></button>';
  Object.keys(cats).sort().forEach(c=>{h+='<button class="dict-cat-pill" data-cat="'+c+'" onclick="selSubCat(\''+type+'\',\''+c+'\')">'+c+' <span class="ct">'+cats[c]+'</span></button>'});
  cEl.innerHTML=h;s.cat=null;s.q='';document.getElementById(type+'Search').value='';filterSub(type);
}
function selSubCat(type,cat){subState[type].cat=cat;document.getElementById(type+'Cats').querySelectorAll('.dict-cat-pill').forEach(p=>{const d=p.dataset.cat;p.classList.toggle('active',cat===null?d==='':d===cat)});filterSub(type)}
function onSubSearch(type){const s=subState[type];clearTimeout(s.timer);s.timer=setTimeout(()=>{s.q=document.getElementById(type+'Search').value.trim().toLowerCase();filterSub(type)},200)}
function filterSub(type){
  const s=subState[type],data=getSubData(type);s.filtered=[];
  for(let i=0;i<data.length;i++){const e=data[i];if(s.cat&&e[3]!==s.cat)continue;if(s.q){const fields=e.map(f=>String(f||'').toLowerCase()).join(' ');if(!fields.includes(s.q))continue}s.filtered.push(i)}
  s.shown=0;document.getElementById(type+'List').innerHTML='';
  document.getElementById(type+'Stats').textContent='共 '+s.filtered.length+' 条'+(s.cat?' · '+s.cat:'')+(s.q?' · 搜索: "'+s.q+'"':'');
  if(s.filtered.length===0){document.getElementById(type+'Empty').style.display='';document.getElementById(type+'More').style.display='none'}
  else{document.getElementById(type+'Empty').style.display='none';loadMoreSub(type)}
}
function loadMoreSub(type){
  const s=subState[type],data=getSubData(type),el=document.getElementById(type+'List');
  // 付费墙：未解锁用户最多浏览100条
  if(s.shown >= SUB_FREE_LIMIT && !gdIsUnlocked()){
    var lbl=type==='eng'?'英粤':'俚语';
    el.insertAdjacentHTML('beforeend', gdPaywallCard(SUB_FREE_LIMIT, data.length, lbl));
    document.getElementById(type+'More').style.display='none';
    document.getElementById(type+'Stats').textContent='显示 '+SUB_FREE_LIMIT+' / '+s.filtered.length+' 条 · 解锁查看全部';
    return;
  }
  const end=Math.min(s.shown+SUB_PAGE,s.filtered.length);
  let h='';
  for(let i=s.shown;i<end;i++){
    const e=data[s.filtered[i]];
    if(type==='eng'){
      const jpParts=e[2].split(' ');const jpHtml=jpParts.map(p=>{const t=parseInt(p.slice(-1));const c=TONE_COLORS[t]||'#64748B';return'<span style="color:'+c+'">'+p+'</span>'}).join(' ');
      h+='<div class="sub-card"><div class="sub-card-eng">'+e[0]+'</div><div class="sub-card-cant">'+e[1]+'</div><div class="sub-card-jp">'+jpHtml+'</div>'+(e[4]?'<div class="sub-card-note">'+e[4]+'</div>':'')+'<span class="sub-card-cat">'+e[3]+'</span><button class="sub-card-speak" onclick="event.stopPropagation();speak(\''+e[1].replace(/'/g,"\\'")+'\',this)">&#x1f50a;</button></div>';
    } else {
      const jpParts=e[1].split(' ');const jpHtml=jpParts.map(p=>{const t=parseInt(p.slice(-1));const c=TONE_COLORS[t]||'#64748B';return'<span style="color:'+c+'">'+p+'</span>'}).join(' ');
      h+='<div class="sub-card"><div class="sub-card-slang">'+e[0]+'</div><div class="sub-card-jp">'+jpHtml+'</div><div class="sub-card-meaning">意思：'+e[2]+'</div>'+(e[4]?'<div class="sub-card-example">\ud83d\udcac '+e[4]+'</div>':'')+(e[5]?'<div class="sub-card-note">'+e[5]+'</div>':'')+'<span class="sub-card-cat">'+e[3]+'</span><button class="sub-card-speak" onclick="event.stopPropagation();speak(\''+e[0].replace(/'/g,"\\'")+'\',this)">&#x1f50a;</button></div>';
    }
  }
  el.insertAdjacentHTML('beforeend',h);s.shown=end;
  document.getElementById(type+'More').style.display=s.shown<s.filtered.length?'':'none';
  document.getElementById(type+'Stats').textContent='显示 '+s.shown+' / '+s.filtered.length+' 条';
}
</script>
